version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - FEATHERLESS_API_KEY=${FEATHERLESS_API_KEY:-}
      - FEATHERLESS_MODEL=${FEATHERLESS_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}
    volumes:
      - faiss_data:/app/faiss_index
      - logs_data:/app/logs
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  faiss_data:
  logs_data:
